# SheLLM agent profiles.
# One running instance — pick a profile at startup with `--agent <name>`.
# Any OpenAI-compatible provider works; set provider/model/base_url/api_key_env.

# Profile to use when `--agent` is not passed. Must match a name below.
default: shellm-local

agents:
  - name: shellm-deepseek
    provider: deepseek
    model: deepseek-chat
    api_key_env: SHELLM_DEEPSEEK_API_KEY
    base_url: "https://api.deepseek.com"
    stream: true
    temperature: 0.1
    supports_tools: true
    has_reasoning: true
    vision: false

  - name: shellm-openrouter
    provider: openrouter
    model: openai/gpt-4o-mini             # any model id from openrouter.ai/models
    api_key_env: SHELLM_OPENROUTER_API_KEY
    base_url: "https://openrouter.ai/api/v1"
    stream: true
    temperature: 0.1
    supports_tools: true
    has_reasoning: false
    vision: true

  - name: shellm-kimi
    provider: moonshot
    model: kimi-k2-0905-preview
    api_key_env: SHELLM_KIMI_API_KEY
    base_url: "https://api.moonshot.ai/v1"
    stream: true
    temperature: 0.1
    supports_tools: true
    has_reasoning: false
    vision: false

  - name: shellm-local
    provider: ollama
    model: gemini-3-flash-preview:cloud   # Ollama cloud-hosted model (`ollama signin` required)
    api_key_env: SHELLM_LOCAL_API_KEY     # Ollama ignores the key; any non-empty value works
    base_url: "http://localhost:11434/v1"
    stream: true
    temperature: 0.1
    supports_tools: true
    has_reasoning: true
    vision: false
